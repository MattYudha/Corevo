name: Deploy Dev Env Corevo

on:
  push:
    branches: [billdev]

jobs:
  deploy:
    name: Deploy to CloudPanel Corevo Dev
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST_DEV }}
          username: ${{ secrets.SSH_USERNAME_DEV }}
          key: ${{ secrets.SSH_KEY_DEV }}
          script: |
            cd ~/htdocs/corevo-dev.aratechnology.id

            echo "-- Pulling the new code"
            git reset --hard HEAD

            echo "-- Pulling the new code"
            git pull origin billdev

            echo "-- Update PHP Vendor"
            composer install --no-dev --optimize-autoloader

            echo "-- Update Database"
            php artisan migrate --force

            echo "-- Clean Server Cache"
            php artisan optimize:clear

            echo "Deploy Completed"
